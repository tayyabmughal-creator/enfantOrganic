name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt
      - name: Django checks
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: testsecret
          DJANGO_DEBUG: "1"
        run: python manage.py check
      - name: Django deploy checks
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: testsecret-for-deploy-check
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: example.com
          DJANGO_CORS_ALLOWED_ORIGINS: https://example.com
          DJANGO_CSRF_TRUSTED_ORIGINS: https://example.com
          REVALIDATION_SECRET: ci-revalidation-secret
        run: python manage.py check --deploy
      - name: Backend tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: testsecret
          DJANGO_DEBUG: "1"
          REVALIDATION_SECRET: ci-revalidation-secret
        run: python manage.py test store.tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend lint/static checks
        working-directory: frontend
        run: npm run lint
      - name: Frontend smoke tests
        working-directory: frontend
        run: npm run test
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api
          API_INTERNAL_BASE_URL: http://127.0.0.1:8000/api
          REVALIDATION_SECRET: ci-revalidation-secret
        run: npm run build
