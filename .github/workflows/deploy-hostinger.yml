name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Docker stack
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload project to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          source: "backend,frontend,deploy,docker-compose.prod.yml,.env.production.example"
          target: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          overwrite: true

      - name: Run deployment on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd "${{ secrets.HOSTINGER_DEPLOY_PATH }}"

            printf '%s\n' \
              "COMPOSE_PROJECT_NAME=enfhantorganic" \
              "HTTP_PORT=${{ secrets.HOSTINGER_HTTP_PORT || 80 }}" \
              "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" \
              "DJANGO_DEBUG=0" \
              "DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}" \
              "DJANGO_CORS_ALLOWED_ORIGINS=${{ secrets.DJANGO_CORS_ALLOWED_ORIGINS }}" \
              "DJANGO_CSRF_TRUSTED_ORIGINS=${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}" \
              "DJANGO_SECURE_SSL_REDIRECT=${{ secrets.DJANGO_SECURE_SSL_REDIRECT || 0 }}" \
              "DJANGO_SESSION_COOKIE_SECURE=${{ secrets.DJANGO_SESSION_COOKIE_SECURE || 1 }}" \
              "DJANGO_CSRF_COOKIE_SECURE=${{ secrets.DJANGO_CSRF_COOKIE_SECURE || 1 }}" \
              "DJANGO_SECURE_HSTS_SECONDS=${{ secrets.DJANGO_SECURE_HSTS_SECONDS || 31536000 }}" \
              "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" \
              "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" \
              "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
              "POSTGRES_HOST=db" \
              "POSTGRES_PORT=5432" \
              "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" \
              "API_INTERNAL_BASE_URL=http://backend:8000/api" \
              "DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}" \
              "EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND || 'django.core.mail.backends.console.EmailBackend' }}" \
              "EMAIL_HOST=${{ secrets.EMAIL_HOST }}" \
              "EMAIL_PORT=${{ secrets.EMAIL_PORT || 587 }}" \
              "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}" \
              "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}" \
              "EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS || 'True' }}" \
              > .env.production

            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py check
            docker image prune -f
