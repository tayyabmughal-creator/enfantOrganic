upstream frontend_app {
    server frontend:3000;
}

upstream backend_app {
    server backend:8000;
}

# ── Shared security headers ────────────────────────────────────────────────
map $sent_http_content_type $csp_default {
    default "default-src 'self'; img-src 'self' data: https:; media-src 'self' https:; font-src 'self' https: data:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https:; frame-src 'self' https://accept.paymob.com https://*.paymob.com https://*.paytabs.com https://*.thawani.om; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https:;";
}

# ── Gzip compression ─────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    image/svg+xml;

# ── Internal HTTP server (proxied by host Nginx) ──────────────────────────
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy $csp_default always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server_tokens off;

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
    }

    location = /django-admin {
        return 301 /django-admin/;
    }

    location /django-admin/ {
        proxy_pass http://backend_app;
    }

    location /api/ {
        proxy_pass http://backend_app;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Region          $http_x_region;
    }
}
