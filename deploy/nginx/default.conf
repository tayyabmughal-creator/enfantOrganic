upstream frontend_app {
    server frontend:3000;
}

upstream backend_app {
    server backend:8000;
}

# ── Shared security headers ────────────────────────────────────────────────
# Applied to all responses via add_header in each server block. `always`
# ensures they are sent on error responses too.
map $sent_http_content_type $csp_default {
    default "default-src 'self'; img-src 'self' data: https:; media-src 'self' https:; font-src 'self' https: data:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https:; frame-src 'self' https://accept.paymob.com https://*.paymob.com https://*.paytabs.com https://*.thawani.om; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https:;";
}

# ── HTTP server: redirect to HTTPS when certs are present, else serve directly
# (Dev usage with no certs falls through to the second server block.)
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Security headers applied at edge regardless of upstream
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy $csp_default always;

    # If you have certs mounted at /etc/nginx/certs/fullchain.pem, redirect to HTTPS.
    # Otherwise (dev), continue to serve over HTTP.
    set $force_https "";
    if (-f /etc/nginx/certs/fullchain.pem) {
        set $force_https "1";
    }
    if ($force_https = "1") {
        return 301 https://$host$request_uri;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server_tokens off;

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
    }

    location = /django-admin {
        return 301 /django-admin/;
    }

    location /django-admin/ {
        proxy_pass http://backend_app;
    }

    location /api/ {
        proxy_pass http://backend_app;
    }

    location / {
        proxy_pass http://frontend_app;
    }
}

# ── HTTPS server (only used when certs are mounted) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 25m;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy $csp_default always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
    }

    location = /django-admin {
        return 301 /django-admin/;
    }

    location /django-admin/ {
        proxy_pass http://backend_app;
    }

    location /api/ {
        proxy_pass http://backend_app;
    }

    location / {
        proxy_pass http://frontend_app;
    }
}
