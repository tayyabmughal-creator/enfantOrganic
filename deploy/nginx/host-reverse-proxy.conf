# Host Nginx reverse-proxy
# Place at /etc/nginx/sites-available/enfantorganic
# Symlink: ln -s /etc/nginx/sites-available/enfantorganic /etc/nginx/sites-enabled/
#
# Docker nginx listens on 127.0.0.1:8082 (HTTP_PORT in .env.production).
# SSL is terminated here; Docker containers see plain HTTP.

# Extracts region code from subdomain (om/ae/sa); empty string for www/app/apex.
map $host $enfant_region {
    ~^(om|ae|sa)\.enfantorganic\.com$   $1;
    default                             "";
}

# ── HTTP → HTTPS (all domains) ───────────────────────────────────────────────
server {
    listen 80;
    server_name enfantorganic.com www.enfantorganic.com app.enfantorganic.com
                om.enfantorganic.com ae.enfantorganic.com sa.enfantorganic.com;

    # Allow certbot ACME challenge without redirect
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Apex (enfantorganic.com) → www redirect ──────────────────────────────────
server {
    listen 443 ssl;
    server_name enfantorganic.com;

    ssl_certificate     /etc/letsencrypt/live/www.enfantorganic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.enfantorganic.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.enfantorganic.com$request_uri;
}

# ── Main: www, app, and region subdomains ────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.enfantorganic.com app.enfantorganic.com
                om.enfantorganic.com ae.enfantorganic.com sa.enfantorganic.com;

    ssl_certificate     /etc/letsencrypt/live/www.enfantorganic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.enfantorganic.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass region code to Docker nginx → Next.js middleware
        proxy_set_header X-Region          $enfant_region;
    }
}
