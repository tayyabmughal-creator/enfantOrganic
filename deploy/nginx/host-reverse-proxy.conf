# Host Nginx reverse-proxy example
# Place this file inside your VPS host Nginx (e.g. /etc/nginx/sites-available/enfantorganic)
# and symlink it to /etc/nginx/sites-enabled/.
#
# Docker nginx is bound to 127.0.0.1:8082 — this host Nginx forwards public traffic there.

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
